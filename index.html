<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Season 2 Hub</title>
    
    <!-- FIREBASE IMPORT SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // =====================================================================
        // ⚠️ PASTE YOUR COPIED FIREBASE CONFIG OVER THIS ENTIRE BLOCK ⚠️
        // =====================================================================
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_COPIED_CODE_HERE",
            authDomain: "PASTE_YOUR_COPIED_CODE_HERE",
            databaseURL: "PASTE_YOUR_COPIED_CODE_HERE",
            projectId: "PASTE_YOUR_COPIED_CODE_HERE",
            storageBucket: "PASTE_YOUR_COPIED_CODE_HERE",
            messagingSenderId: "PASTE_YOUR_COPIED_CODE_HERE",
            appId: "PASTE_YOUR_COPIED_CODE_HERE"
        };
        // =====================================================================

        // Initialize App, Database, and Auth
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- PUBLIC LEADERBOARD LOGIC ---
        async function loadLeaderboard() {
            const leaderboardList = document.getElementById("leaderboard-list");
            leaderboardList.innerHTML = "<p style='text-align:center;'>Loading live data...</p>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "players"));
                let html = "";
                
                let playersData = [];
                querySnapshot.forEach((doc) => {
                    playersData.push({ id: doc.id, ...doc.data() });
                });
                
                playersData.sort((a, b) => b.totalScore - a.totalScore);

                playersData.forEach((p) => {
                    html += `
                    <div class="player-card">
                        <div class="player-header">
                            <strong>${p.id}</strong>
                            <span class="total-score">${p.totalScore || 0} Pts</span>
                        </div>
                        <div class="stats-row">
                            <span>Raw: ${p.rawPoints || 0}</span> | 
                            <span>Bonus: ${p.bonusPoints || 0}</span> | 
                            <span>Att: ${p.attendance || 0}</span>
                        </div>
                    </div>`;
                });
                
                if(html === "") html = "<p style='text-align:center; color:#aaa;'>No player data found yet.</p>";
                leaderboardList.innerHTML = html;
            } catch (error) {
                leaderboardList.innerHTML = `<p style='color:#ff6b6b;'>Error loading data: ${error.message}</p>`;
            }
        }

        // --- ADMIN AUTH & DATA INJECTION LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("admin-panel").style.display = "block";
                document.getElementById("login-section").style.display = "none";
                document.getElementById("admin-status").innerText = `Logged in as: ${user.email}`;
            } else {
                document.getElementById("admin-panel").style.display = "none";
                document.getElementById("login-section").style.display = "block";
            }
        });

        window.loginAdmin = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => alert("Master Admin Access Granted"))
                .catch((error) => alert("Login Failed: " + error.message));
        };

        window.logoutAdmin = () => {
            signOut(auth).then(() => alert("Logged out successfully."));
        };

        // NEW: Function to inject your pre-recorded Gameweek 1 Data
        window.loadHistoricalData = async () => {
            const button = document.getElementById("load-data-btn");
            button.innerText = "Loading Data...";
            
            const gw1Data = [
                { id: "Luke", raw: 81, bonus: 8, att: 1, total: 90 },
                { id: "Figo & Ezra", raw: 79, bonus: 6, att: 1, total: 86 },
                { id: "Naashid & Matthew", raw: 70, bonus: 4, att: 1, total: 75 },
                { id: "Jason & Leigh", raw: 67, bonus: 2, att: 1, total: 70 },
                { id: "Simone & Charlie", raw: 57, bonus: 4, att: 1, total: 62 },
                { id: "Kyle & Sky", raw: 56, bonus: 2, att: 1, total: 59 },
                { id: "Brady & Aneeqah", raw: 54, bonus: 2, att: 1, total: 57 }
            ];

            try {
                for (const p of gw1Data) {
                    await setDoc(doc(db, "players", p.id), {
                        rawPoints: p.raw,
                        bonusPoints: p.bonus,
                        attendance: p.att,
                        totalScore: p.total
                    });
                }
                alert("Gameweek 1 Data successfully loaded into your database!");
                button.innerText = "Data Loaded Successfully";
                button.style.backgroundColor = "#18bc9c";
                loadLeaderboard(); 
            } catch (error) {
                alert("Error loading data: " + error.message);
                button.innerText = "Load Gameweek 1 Data";
            }
        };

        window.placeholderAction = () => {
            alert("This feature will require cloud functions to be set up in Phase 2!");
        };

        // Run when page loads
        window.onload = loadLeaderboard;
    </script>

    <!-- DARK THEME STYLING -->
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background: #121212; /* Dark background */
            color: #e0e0e0; /* Light text */
            max-width: 600px;
            margin: 0 auto;
        }
        .card { 
            background: #1e1e1e; /* Darker card background */
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }
        h1 { color: #18bc9c; margin-top: 0; font-size: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1px;}
        h2 { font-size: 18px; color: #18bc9c; border-bottom: 1px solid #333; padding-bottom: 8px;}
        
        .player-card {
            background: #2c2c2c;
            border-left: 5px solid #18bc9c;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .player-header strong { font-size: 18px; color: #ffffff; }
        .total-score { font-size: 18px; font-weight: bold; color: #18bc9c; }
        .stats-row { color: #aaaaaa; font-size: 13px; display: flex; justify-content: space-between;}

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            background: #2c2c2c;
            color: white;
            border: 1px solid #444; 
            border-radius: 6px; 
            box-sizing: border-box;
        }
        button { 
            background: #18bc9c; 
            color: #121212; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        button:hover { background: #128f76; }
        
        .action-btn { background: #3498db; color: white; }
        .action-btn:hover { background: #2980b9; }
        
        .logout-btn { background: #e74c3c; color: white; }
        .logout-btn:hover { background: #c0392b; }
        
        #admin-panel { display: none; border-top: 4px solid #e74c3c; }
        .hidden-label { font-size: 12px; color: #555; text-align: center; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- PUBLIC VIEW: THE LEADERBOARD -->
    <div class="card">
        <h1>🏆 Season 2 Standings</h1>
        <div id="leaderboard-list">
            <!-- Data from Firestore loads here -->
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="card" id="login-section">
        <h2>Admin Access</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginAdmin()">Unlock Dashboard</button>
    </div>

    <!-- HIDDEN ADMIN DASHBOARD -->
    <div class="card" id="admin-panel">
        <h1 style="color: #e74c3c;">⚙️ Master Dashboard</h1>
        <p id="admin-status" style="text-align: center; font-size: 14px; color: #aaa;"></p>
        
        <h2>1. Historical Data</h2>
        <button id="load-data-btn" class="action-btn" onclick="loadHistoricalData()">Push Gameweek 1 Data</button>
        
        <h2>2. Match Management</h2>
        <button onclick="placeholderAction()">Generate Fixture Matrix</button>
        
        <h2>3. Roster Management</h2>
        <button onclick="placeholderAction()">Assign Stand-In/Ghost Player</button>

        <hr style="border: 1px solid #333; margin: 20px 0;">
        <button class="logout-btn" onclick="logoutAdmin()">Lock Dashboard (Log Out)</button>
    </div>

    <span class="hidden-label">Padel Live Tracking System V2</span>

</body>
</html>
