<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Season 2 Hub</title>
    
    <!-- CHART.JS FOR GRAPHS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FIREBASE IMPORT SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, writeBatch, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // =====================================================================
        // ⚠️ IMPORTANT: PASTE YOUR *NEW* FIREBASE KEYS HERE
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB4zPzxFU7fcz7JCUrWJVTf6uk7UQYdmoQ", 
            authDomain: "padel-tournament-9f1b6.firebaseapp.com", 
            databaseURL: "https://padel-tournament-9f1b6-default-rtdb.firebaseio.com", 
            projectId: "padel-tournament-9f1b6", 
            storageBucket: "padel-tournament-9f1b6.firebasestorage.app", 
            messagingSenderId: "479440834494", 
            appId: "1:479440834494:web:f5c42ee88b93c2858173ef" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let globalPlayersData = []; 
        let globalMatchesData = [];
        let activeTeamsList = []; 

        // --- CORE DATA LOADING ---
        window.loadAllData = async () => {
            const lbList = document.getElementById("leaderboard-list");
            if (lbList) lbList.innerHTML = "<p style='text-align:center;'>Loading live data...</p>";
            
            try {
                // 1. Fetch Players
                const pSnapshot = await getDocs(collection(db, "players"));
                globalPlayersData = [];
                let totalLeaguePoints = 0;
                
                pSnapshot.forEach((doc) => {
                    const data = { id: doc.id, ...doc.data() };
                    globalPlayersData.push(data);
                    totalLeaguePoints += (data.rawPoints || 0);
                });
                
                document.getElementById("stat-players").innerText = globalPlayersData.length;
                document.getElementById("stat-points").innerText = totalLeaguePoints;

                // 2. Fetch Matches
                const mSnapshot = await getDocs(collection(db, "matches"));
                globalMatchesData = [];
                mSnapshot.forEach((doc) => {
                    globalMatchesData.push({ id: doc.id, ...doc.data() });
                });

                window.renderLeaderboard();
                window.renderMatches();
                window.populateAdminDropdowns();

            } catch (error) {
                console.error("Critical Load Error:", error);
                if (lbList) lbList.innerHTML = `<p style='color:#ff6b6b; text-align:center;'>Database connection failed. Please check your config keys.</p>`;
            }
        };

        // --- RENDER LEADERBOARD & ROSTERS ---
        window.renderLeaderboard = () => {
            let html = "";
            let activeTeams = [];
            let freeAgents = [];
            let processedPairs = new Set();
            activeTeamsList = []; 

            globalPlayersData.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0)); 

            globalPlayersData.forEach((p) => {
                html += `
                <div class="player-card" onclick="window.openPlayerModal('${p.id}')">
                    <div class="player-header">
                        <strong>${p.id}</strong>
                        <span class="total-score">${p.totalScore || 0} Pts</span>
                    </div>
                    <div class="stats-row">
                        <span>Raw: ${p.rawPoints || 0}</span> | 
                        <span>Bonus: ${p.bonusPoints || 0}</span> | 
                        <span>Att: ${p.attendance || 0}</span>
                    </div>
                </div>`;

                if (p.isFreeAgent) {
                    freeAgents.push(p.id);
                } else if (p.currentPartner && !processedPairs.has(p.id)) {
                    // Only display teams if they aren't the Proxy
                    const p1Display = p.id;
                    const p2Display = p.currentPartner;
                    const teamStr = `${p1Display} & ${p2Display}`;
                    activeTeams.push(teamStr);
                    activeTeamsList.push({ p1: p.id, p2: p.currentPartner, name: teamStr });
                    processedPairs.add(p.id);
                    processedPairs.add(p.currentPartner);
                }
            });
            
            document.getElementById("live-teams").innerHTML = activeTeams.length > 0 
                ? activeTeams.map(t => `<div class="team-tag">${t}</div>`).join('') 
                : "<p style='color:#aaa; font-size: 13px;'>No teams generated yet.</p>";
            
            document.getElementById("live-free-agents").innerHTML = freeAgents.length > 0 
                ? freeAgents.map(fa => `<div class="fa-tag">${fa}</div>`).join('') 
                : "<p style='color:#aaa; font-size: 13px;'>None currently.</p>";

            document.getElementById("leaderboard-list").innerHTML = html || "<p style='text-align:center; color:#aaa;'>No player data.</p>";
        };

        // --- RENDER FIXTURES & RESULTS ---
        window.renderMatches = () => {
            let fixturesHtml = "";
            let resultsHtml = "";
            let approvalsHtml = "";

            globalMatchesData.forEach(m => {
                const teamAStr = Array.isArray(m.teamA) ? m.teamA.join(" & ") : "Team A";
                const teamBStr = Array.isArray(m.teamB) ? m.teamB.join(" & ") : "Team B";
                const gwLabel = m.gameweek ? `<span style="background:#444; padding:2px 6px; border-radius:4px; font-size:10px;">${m.gameweek}</span>` : "";
                
                if (m.status === "pending") {
                    fixturesHtml += `
                    <div class="match-card">
                        <div style="text-align:center; margin-bottom:10px;">${gwLabel}<br><b>${teamAStr}</b> <br><span style="color:#f39c12; font-size:12px;">VS</span><br> <b>${teamBStr}</b></div>
                        <button class="action-btn" onclick="window.userSubmitScore('${m.id}', '${teamAStr}', '${teamBStr}')">Input Score</button>
                    </div>`;
                } else if (m.status === "played") {
                    fixturesHtml += `
                    <div class="match-card" style="border-left: 4px solid #f39c12;">
                        <div style="text-align:center;">${gwLabel}<br><b>${teamAStr}</b> (${m.scoreA}) <br><span style="color:#f39c12; font-size:12px;">VS</span><br> <b>${teamBStr}</b> (${m.scoreB})</div>
                        <p style="text-align:center; color:#f39c12; font-size:12px; margin: 10px 0 0 0;">Under Admin Review ⏳</p>
                    </div>`;
                    
                    approvalsHtml += `
                    <div class="match-card" style="border-left: 4px solid #f39c12;">
                        <p style="margin:0 0 10px 0; font-size:14px;">${gwLabel} <b>${teamAStr}</b> (${m.scoreA}) vs <b>${teamBStr}</b> (${m.scoreB})</p>
                        <button style="background:#27ae60; color:white; padding:8px;" onclick="window.approveScore('${m.id}')">Approve & Update Profiles</button>
                        <button style="background:#e74c3c; color:white; padding:8px; margin-top:5px;" onclick="window.rejectScore('${m.id}')">Reject (Reset)</button>
                    </div>`;
                } else if (m.status === "confirmed") {
                    resultsHtml += `
                    <div class="match-card" style="border-left: 4px solid #18bc9c;">
                        <div style="text-align:center; font-size:15px;">
                            ${gwLabel}<br><b>${teamAStr}</b> <span style="color:#18bc9c; font-size:18px; font-weight:bold;">${m.scoreA}</span> - <span style="color:#18bc9c; font-size:18px; font-weight:bold;">${m.scoreB}</span> <b>${teamBStr}</b>
                        </div>
                    </div>`;
                }
            });

            document.getElementById("fixtures-list").innerHTML = fixturesHtml || "<p style='text-align:center; color:#aaa;'>No active fixtures.</p>";
            document.getElementById("results-list").innerHTML = resultsHtml || "<p style='text-align:center; color:#aaa;'>No results yet.</p>";
            
            const approvalSection = document.getElementById("admin-approvals");
            if (approvalsHtml) {
                approvalSection.innerHTML = `<h3 style="color:#e74c3c; margin-top:0;">🚨 Pending Approvals</h3>` + approvalsHtml;
                approvalSection.style.display = "block";
            } else {
                approvalSection.style.display = "none";
            }
        };

        // --- TAB SWITCHING ---
        window.switchTab = (tabId) => {
            document.getElementById("tab-leaderboard").style.display = "none";
            document.getElementById("tab-fixtures").style.display = "none";
            document.getElementById("tab-results").style.display = "none";
            document.getElementById("btn-leaderboard").classList.remove("active-tab");
            document.getElementById("btn-fixtures").classList.remove("active-tab");
            document.getElementById("btn-results").classList.remove("active-tab");

            document.getElementById(`tab-${tabId}`).style.display = "block";
            document.getElementById(`btn-${tabId}`).classList.add("active-tab");
        };

        // --- USER SCORE INPUT ---
        window.userSubmitScore = async (matchId, teamA, teamB) => {
            const scoreA = prompt(`Enter RAW points scored by ${teamA}:`);
            if(scoreA === null || scoreA === "") return;
            const scoreB = prompt(`Enter RAW points scored by ${teamB}:`);
            if(scoreB === null || scoreB === "") return;

            try {
                await updateDoc(doc(db, "matches", matchId), {
                    scoreA: parseInt(scoreA),
                    scoreB: parseInt(scoreB),
                    status: "played"
                });
                alert("Score submitted! Waiting for Admin confirmation.");
                await window.loadAllData();
            } catch (error) { alert("Error submitting score: " + error.message); }
        };

        // --- ADMIN SCORE APPROVAL & ATTENDANCE LOGIC ---
        window.approveScore = async (matchId) => {
            const match = globalMatchesData.find(m => m.id === matchId);
            if(!match) return;

            let bonusA = 0, bonusB = 0;
            if (match.scoreA > match.scoreB) bonusA += 2;
            else if (match.scoreB > match.scoreA) bonusB += 2;
            else { bonusA += 1; bonusB += 1; }

            if (match.scoreA > 0 && match.scoreB === 0) bonusA += 1;
            if (match.scoreB > 0 && match.scoreA === 0) bonusB += 1;

            const gw = match.gameweek || document.getElementById('active-gameweek').value;

            try {
                const batch = writeBatch(db);
                
                const processPlayerPoints = (playerId, score, bonus) => {
                    if (playerId === "PROXY") return; // Bypass Proxy entirely
                    
                    const pData = globalPlayersData.find(p => p.id === playerId);
                    if (!pData) return;

                    let attendanceInc = 0;
                    let attended = pData.attendedGWs || [];
                    
                    // Smart Attendance check: If they haven't gotten an attendance point for this GW yet, give them 1.
                    if (!attended.includes(gw)) {
                        attendanceInc = 1;
                        attended.push(gw);
                    }

                    batch.update(doc(db, "players", playerId), {
                        rawPoints: increment(score), 
                        bonusPoints: increment(bonus), 
                        attendance: increment(attendanceInc), 
                        totalScore: increment(score + bonus + attendanceInc),
                        attendedGWs: attended
                    });
                };

                if (Array.isArray(match.teamA)) match.teamA.forEach(pid => processPlayerPoints(pid, match.scoreA, bonusA));
                if (Array.isArray(match.teamB)) match.teamB.forEach(pid => processPlayerPoints(pid, match.scoreB, bonusB));

                batch.update(doc(db, "matches", matchId), { status: "confirmed" });
                await batch.commit();
                alert(`Score Approved! Points and ${gw} attendance tallied.`);
                await window.loadAllData();
            } catch (error) { alert("Approval Error: " + error.message); }
        };

        window.rejectScore = async (matchId) => {
            if(!confirm("Reject this score and reset it to a fixture?")) return;
            try {
                await updateDoc(doc(db, "matches", matchId), { scoreA: 0, scoreB: 0, status: "pending" });
                await window.loadAllData();
            } catch (error) { alert("Reject Error: " + error.message); }
        };

        // --- PLAYER MANAGEMENT ---
        window.addNewPlayer = async () => {
            const nameInput = document.getElementById("new-player-name").value.trim();
            if(!nameInput) return alert("Please enter a player name.");
            
            if(globalPlayersData.find(p => String(p.id).toLowerCase() === nameInput.toLowerCase())) {
                return alert("A player with this name already exists.");
            }

            try {
                await setDoc(doc(db, "players", nameInput), {
                    rawPoints: 0, bonusPoints: 0, attendance: 0, totalScore: 0,
                    history: [0], partners: [], currentPartner: null, isFreeAgent: false, attendedGWs: []
                });
                alert(`${nameInput} successfully added to the database!`);
                document.getElementById("new-player-name").value = "";
                await window.loadAllData();
            } catch (error) { alert("Error adding player: " + error.message); }
        };

        window.deletePlayer = async () => {
            const playerId = document.getElementById("delete-player-select").value;
            if(!playerId) return alert("Select a player to delete.");
            if(!confirm(`⚠️ WARNING: Are you sure you want to completely delete ${playerId}? This cannot be undone.`)) return;

            try {
                await deleteDoc(doc(db, "players", playerId));
                alert(`${playerId} has been deleted.`);
                await window.loadAllData();
            } catch (error) { alert("Error deleting player: " + error.message); }
        };

        window.populateAdminDropdowns = () => {
            let pOptions = '<option value="">-- Select Player --</option>';
            pOptions += '<option value="PROXY">🥷 PROXY / GUEST (No Points)</option>';

            let sortedPlayers = [...globalPlayersData].sort((a,b) => String(a.id).localeCompare(String(b.id)));
            sortedPlayers.forEach(p => pOptions += `<option value="${p.id}">${p.id}</option>`);
            
            document.getElementById('team-p1').innerHTML = pOptions;
            document.getElementById('team-p2').innerHTML = pOptions;
            document.getElementById('fa-player').innerHTML = pOptions;
            
            // Populate Delete Dropdown excluding PROXY
            let delOptions = '<option value="">-- Select Player to Delete --</option>';
            sortedPlayers.forEach(p => delOptions += `<option value="${p.id}">${p.id}</option>`);
            document.getElementById('delete-player-select').innerHTML = delOptions;

            let tOptions = '<option value="">-- Select A Live Team --</option>';
            activeTeamsList.forEach((t, index) => {
                tOptions += `<option value="${index}">${t.name}</option>`;
            });
            document.getElementById('fix-teamA').innerHTML = tOptions;
            document.getElementById('fix-teamB').innerHTML = tOptions;
        };

        window.createFixture = async () => {
            const idxA = document.getElementById('fix-teamA').value;
            const idxB = document.getElementById('fix-teamB').value;
            const currentGW = document.getElementById('active-gameweek').value;

            if(idxA === "" || idxB === "") return alert("Select two teams.");
            if(idxA === idxB) return alert("A team cannot play itself!");

            const teamA = activeTeamsList[idxA];
            const teamB = activeTeamsList[idxB];
            const matchId = `match_${Date.now()}`;

            try {
                await setDoc(doc(db, "matches", matchId), {
                    teamA: [teamA.p1, teamA.p2],
                    teamB: [teamB.p1, teamB.p2],
                    scoreA: 0,
                    scoreB: 0,
                    status: "pending",
                    gameweek: currentGW
                });
                alert(`Fixture created for ${currentGW} and is now live!`);
                await window.loadAllData();
            } catch (error) { alert("Error creating fixture: " + error.message); }
        };

        window.clearMatchesByStatus = async (status) => {
            if(!confirm(`Are you sure you want to delete all ${status} matches?`)) return;
            try {
                const batch = writeBatch(db);
                globalMatchesData.filter(m => m.status === status).forEach(m => {
                    batch.delete(doc(db, "matches", m.id));
                });
                await batch.commit();
                alert(`All ${status} matches cleared.`);
                await window.loadAllData();
            } catch (error) { alert("Error clearing matches: " + error.message); }
        };

        // --- MODAL & LINE GRAPH ---
        let playerChart = null;
        window.openPlayerModal = (playerId) => {
            const player = globalPlayersData.find(p => p.id === playerId);
            if(!player) return;

            document.getElementById("modal-name").innerText = player.id + "'s Profile";
            const partners = Array.isArray(player.partners) && player.partners.length > 0 ? player.partners.join(", ") : "None yet";
            document.getElementById("modal-partners").innerHTML = `<b>Past Partners:</b> ${partners}`;
            document.getElementById("player-modal").style.display = "block";

            const ctx = document.getElementById('playerChart').getContext('2d');
            if(playerChart) playerChart.destroy(); 
            
            playerChart = new Chart(ctx, {
                type: 'line', 
                data: {
                    labels: ['Start', 'GW1', 'GW2', 'GW3', 'GW4'], 
                    datasets: [{
                        label: 'Points History',
                        data: Array.isArray(player.history) && player.history.length > 0 ? player.history : [0, player.totalScore], 
                        borderColor: '#18bc9c', 
                        backgroundColor: 'rgba(24, 188, 156, 0.2)', 
                        borderWidth: 3,
                        tension: 0.3, 
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, grid: { color: '#333' } }, x: { grid: { color:
