<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Season 2 Hub</title>
    
    <!-- CHART.JS FOR GRAPHS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FIREBASE IMPORT SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // =====================================================================
        // YOUR REAL FIREBASE KEYS (FIXED)
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB4zPzxFU7fcz7JCUrWJVTf6uk7UQYdmoQ",
            authDomain: "padel-tournament-9f1b6.firebaseapp.com",
            databaseURL: "https://padel-tournament-9f1b6-default-rtdb.firebaseio.com",
            projectId: "padel-tournament-9f1b6",
            storageBucket: "padel-tournament-9f1b6.firebasestorage.app",
            messagingSenderId: "479440834494",
            appId: "1:479440834494:web:f5c42ee88b93c2858173ef"
        };
        // =====================================================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let globalPlayersData = []; // Store data for the graph modal

        // --- PUBLIC LEADERBOARD & GLOBAL STATS ---
        async function loadLeaderboard() {
            const leaderboardList = document.getElementById("leaderboard-list");
            leaderboardList.innerHTML = "<p style='text-align:center;'>Loading live data...</p>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "players"));
                let html = "";
                let totalLeaguePoints = 0;
                globalPlayersData = [];
                
                querySnapshot.forEach((doc) => {
                    const data = { id: doc.id, ...doc.data() };
                    globalPlayersData.push(data);
                    totalLeaguePoints += (data.rawPoints || 0);
                });
                
                // Update Global Stats Banner
                document.getElementById("stat-players").innerText = globalPlayersData.length;
                document.getElementById("stat-points").innerText = totalLeaguePoints;

                // Sort by total score
                globalPlayersData.sort((a, b) => b.totalScore - a.totalScore);

                globalPlayersData.forEach((p) => {
                    html += `
                    <div class="player-card" onclick="openPlayerModal('${p.id}')">
                        <div class="player-header">
                            <strong>${p.id}</strong>
                            <span class="total-score">${p.totalScore || 0} Pts</span>
                        </div>
                        <div class="stats-row">
                            <span>Raw: ${p.rawPoints || 0}</span> | 
                            <span>Bonus: ${p.bonusPoints || 0}</span> | 
                            <span>Att: ${p.attendance || 0}</span>
                        </div>
                    </div>`;
                });
                
                if(html === "") html = "<p style='text-align:center; color:#aaa;'>No player data found yet.</p>";
                leaderboardList.innerHTML = html;
            } catch (error) {
                leaderboardList.innerHTML = `<p style='color:#ff6b6b;'>Error loading data: ${error.message}</p>`;
            }
        }

        // --- PLAYER MODAL & GRAPH LOGIC ---
        let playerChart = null;
        window.openPlayerModal = (playerId) => {
            const player = globalPlayersData.find(p => p.id === playerId);
            if(!player) return;

            document.getElementById("modal-name").innerText = player.id + "'s Profile";
            
            // Show partners (The Hustle Constraint Check)
            const partners = player.partners ? player.partners.join(", ") : "None yet";
            document.getElementById("modal-partners").innerHTML = `<b>Past Partners:</b> ${partners}`;

            document.getElementById("player-modal").style.display = "block";

            // Render Chart
            const ctx = document.getElementById('playerChart').getContext('2d');
            if(playerChart) playerChart.destroy(); // Clear old chart
            
            playerChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['GW1', 'GW2', 'GW3', 'GW4'], // Placeholder for gameweeks
                    datasets: [{
                        label: 'Points per Gameweek',
                        data: player.history || [player.totalScore, 0, 0, 0], 
                        backgroundColor: '#18bc9c',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, grid: { color: '#333' } }, x: { grid: { color: '#333' } } },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        };

        window.closeModal = () => {
            document.getElementById("player-modal").style.display = "none";
        };

        // --- ADMIN AUTH ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("admin-panel").style.display = "block";
                document.getElementById("login-section").style.display = "none";
                document.getElementById("admin-status").innerText = `Logged in as: ${user.email}`;
            } else {
                document.getElementById("admin-panel").style.display = "none";
                document.getElementById("login-section").style.display = "block";
            }
        });

        window.loginAdmin = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => alert("Master Admin Access Granted!"))
                .catch((error) => alert("Login Failed: " + error.message));
        };

        window.logoutAdmin = () => {
            signOut(auth).then(() => alert("Logged out successfully."));
        };

        // --- WORKING ADMIN BUTTONS ---
        window.loadHistoricalData = async () => {
            const button = document.getElementById("load-data-btn");
            button.innerText = "Loading Individual Data...";
            
            // Separated into individuals for the individual leaderboard rule
            const gw1Data = [
                { id: "Luke", raw: 81, bonus: 8, att: 1, total: 90, partners: ["Rotating Fillers"], history: [90] },
                { id: "Figo", raw: 79, bonus: 6, att: 1, total: 86, partners: ["Ezra"], history: [86] },
                { id: "Ezra", raw: 79, bonus: 6, att: 1, total: 86, partners: ["Figo"], history: [86] },
                { id: "Naashid", raw: 70, bonus: 4, att: 1, total: 75, partners: ["Matthew"], history: [75] },
                { id: "Matthew", raw: 70, bonus: 4, att: 1, total: 75, partners: ["Naashid"], history: [75] },
                { id: "Jason", raw: 67, bonus: 2, att: 1, total: 70, partners: ["Leigh"], history: [70] },
                { id: "Leigh", raw: 67, bonus: 2, att: 1, total: 70, partners: ["Jason"], history: [70] },
                { id: "Simone", raw: 57, bonus: 4, att: 1, total: 62, partners: ["Charlie"], history: [62] },
                { id: "Charlie", raw: 57, bonus: 4, att: 1, total: 62, partners: ["Simone"], history: [62] },
                { id: "Kyle", raw: 56, bonus: 2, att: 1, total: 59, partners: ["Sky"], history: [59] },
                { id: "Sky", raw: 56, bonus: 2, att: 1, total: 59, partners: ["Kyle"], history: [59] },
                { id: "Brady", raw: 54, bonus: 2, att: 1, total: 57, partners: ["Aneeqah"], history: [57] },
                { id: "Aneeqah", raw: 54, bonus: 2, att: 1, total: 57, partners: ["Brady"], history: [57] }
            ];

            try {
                for (const p of gw1Data) {
                    await setDoc(doc(db, "players", p.id), {
                        rawPoints: p.raw,
                        bonusPoints: p.bonus,
                        attendance: p.att,
                        totalScore: p.total,
                        partners: p.partners,
                        history: p.history
                    });
                }
                alert("Gameweek 1 Individual Data loaded!");
                button.innerText = "Data Loaded Successfully";
                button.style.backgroundColor = "#18bc9c";
                loadLeaderboard(); 
            } catch (error) {
                alert("Error loading data: " + error.message);
                button.innerText = "Push Gameweek 1 Data";
            }
        };

        window.generateMatrixPrompt = () => {
            const promptText = "Generate 7 rounds for 14 players on 2 courts. Format it clearly. Ensure no duplicate pairings from last week based on The Hustle Constraint.";
            navigator.clipboard.writeText(promptText).then(() => {
                alert("Prompt copied to your clipboard! Open ChatGPT or Gemini and paste it in to get your matrix.");
            });
        };

        window.assignGhostPlayer = () => {
            const ghostName = prompt("Enter the name of the Stand-In / Ghost Player:");
            if(ghostName) {
                alert(ghostName + " has been temporarily authorized for this gameweek. Registered league partner will receive points.");
            }
        };

        window.onload = loadLeaderboard;
    </script>

    <!-- DARK THEME & MODAL STYLING -->
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 15px; 
            background: #121212; 
            color: #e0e0e0; 
            max-width: 600px;
            margin: 0 auto;
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }
        h1 { color: #18bc9c; margin-top: 0; font-size: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1px;}
        h2 { font-size: 18px; color: #18bc9c; border-bottom: 1px solid #333; padding-bottom: 8px;}
        
        /* Global Stats Banner */
        .global-stats {
            display: flex;
            justify-content: space-around;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #18bc9c;
        }
        .stat-box { text-align: center; }
        .stat-box span { display: block; font-size: 24px; font-weight: bold; color: #18bc9c; }
        .stat-box small { color: #aaa; font-size: 12px; text-transform: uppercase; }

        .player-card {
            background: #2c2c2c;
            border-left: 5px solid #18bc9c;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .player-card:active { transform: scale(0.98); }
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .player-header strong { font-size: 18px; color: #ffffff; }
        .total-score { font-size: 18px; font-weight: bold; color: #18bc9c; }
        .stats-row { color: #aaaaaa; font-size: 13px; display: flex; justify-content: space-between;}

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background-color: #1e1e1e;
            margin: 20% auto; 
            padding: 20px;
            border: 1px solid #18bc9c;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            color: white;
        }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #fff; }

        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box;}
        button { background: #18bc9c; color: #121212; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; margin-bottom: 12px;}
        .action-btn { background: #3498db; color: white; }
        .logout-btn { background: #e74c3c; color: white; }
        #admin-panel { display: none; border-top: 4px solid #e74c3c; }
    </style>
</head>
<body>

    <!-- PUBLIC VIEW: THE LEADERBOARD -->
    <div class="card">
        <h1>🏆 Season 2 Standings</h1>
        
        <div class="global-stats">
            <div class="stat-box">
                <span id="stat-players">0</span>
                <small>Active Players</small>
            </div>
            <div class="stat-box">
                <span id="stat-points">0</span>
                <small>Total Raw Pts</small>
            </div>
        </div>

        <p style="text-align: center; color: #aaa; font-size: 12px;">Tap any player to view history & partners</p>
        
        <div id="leaderboard-list"></div>
    </div>

    <!-- PLAYER STATS MODAL -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-name" style="margin-top: 0;">Player Profile</h2>
            <p id="modal-partners" style="font-size: 14px; color: #ccc;"></p>
            <canvas id="playerChart" width="400" height="250"></canvas>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="card" id="login-section">
        <h2>Admin Access</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginAdmin()">Unlock Dashboard</button>
    </div>

    <!-- HIDDEN ADMIN DASHBOARD -->
    <div class="card" id="admin-panel">
        <h1 style="color: #e74c3c;">⚙️ Master Dashboard</h1>
        <p id="admin-status" style="text-align: center; font-size: 14px; color: #aaa;"></p>
        
        <h2>1. Initialization</h2>
        <button id="load-data-btn" class="action-btn" onclick="loadHistoricalData()">Push Gameweek 1 Data</button>
        
        <h2>2. Match Logistics</h2>
        <button onclick="generateMatrixPrompt()">Copy Matrix Prompt for AI</button>
        
        <h2>3. Roster Overrides</h2>
        <button onclick="assignGhostPlayer()">Assign Stand-In / Ghost Player</button>

        <hr style="border: 1px solid #333; margin: 20px 0;">
        <button class="logout-btn" onclick="logoutAdmin()">Lock Dashboard (Log Out)</button>
    </div>

</body>
</html>
