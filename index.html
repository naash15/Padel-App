<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Season 2 Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, writeBatch, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // =====================================================================
        // YOUR REAL FIREBASE KEYS
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB4zPzxFU7fcz7JCUrWJVTf6uk7UQYdmoQ",
            authDomain: "padel-tournament-9f1b6.firebaseapp.com",
            databaseURL: "https://padel-tournament-9f1b6-default-rtdb.firebaseio.com",
            projectId: "padel-tournament-9f1b6",
            storageBucket: "padel-tournament-9f1b6.firebasestorage.app",
            messagingSenderId: "479440834494",
            appId: "1:479440834494:web:f5c42ee88b93c2858173ef"
        };
        // =====================================================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let globalPlayersData = []; 
        let globalMatchesData = [];
        let activeTeamsList = []; 

        window.loadAllData = async () => {
            const pSnapshot = await getDocs(collection(db, "players"));
            globalPlayersData = [];
            let totalLeaguePoints = 0;
            pSnapshot.forEach((doc) => {
                const data = { id: doc.id, ...doc.data() };
                globalPlayersData.push(data);
                totalLeaguePoints += (data.rawPoints || 0);
            });
            
            document.getElementById("stat-players").innerText = globalPlayersData.length;
            document.getElementById("stat-points").innerText = totalLeaguePoints;

            const mSnapshot = await getDocs(collection(db, "matches"));
            globalMatchesData = [];
            mSnapshot.forEach((doc) => { globalMatchesData.push({ id: doc.id, ...doc.data() }); });

            renderLeaderboard();
            renderMatches();
            populateAdminDropdowns();
        };

        function renderLeaderboard() {
            let html = "";
            let activeTeams = [];
            let freeAgents = [];
            let processedPairs = new Set();
            activeTeamsList = []; 

            globalPlayersData.sort((a, b) => b.totalScore - a.totalScore); 

            globalPlayersData.forEach((p) => {
                html += `
                <div class="player-card" onclick="openPlayerModal('${p.id}')">
                    <div class="player-header"><strong>${p.id}</strong><span class="total-score">${p.totalScore || 0} Pts</span></div>
                    <div class="stats-row"><span>Raw: ${p.rawPoints || 0}</span> | <span>Bonus: ${p.bonusPoints || 0}</span> | <span>Att: ${p.attendance || 0}</span></div>
                </div>`;

                if (p.isFreeAgent) freeAgents.push(p.id);
                else if (p.currentPartner && !processedPairs.has(p.id)) {
                    activeTeams.push(`${p.id} & ${p.currentPartner}`);
                    activeTeamsList.push({ p1: p.id, p2: p.currentPartner, name: `${p.id} & ${p.currentPartner}` });
                    processedPairs.add(p.id); processedPairs.add(p.currentPartner);
                }
            });
            
            document.getElementById("live-teams").innerHTML = activeTeams.length > 0 ? activeTeams.map(t => `<div class="team-tag">${t}</div>`).join('') : "<p style='color:#aaa; font-size: 13px;'>No teams generated yet.</p>";
            document.getElementById("live-free-agents").innerHTML = freeAgents.length > 0 ? freeAgents.map(fa => `<div class="fa-tag">${fa}</div>`).join('') : "<p style='color:#aaa; font-size: 13px;'>None currently.</p>";
            document.getElementById("leaderboard-list").innerHTML = html;
        }

        function populateAdminDropdowns() {
            let pOptions = '<option value="">-- Select Player --</option>';
            [...globalPlayersData].sort((a,b) => a.id.localeCompare(b.id)).forEach(p => pOptions += `<option value="${p.id}">${p.id}</option>`);
            document.getElementById('team-p1').innerHTML = pOptions;
            document.getElementById('team-p2').innerHTML = pOptions;
            document.getElementById('fa-player').innerHTML = pOptions;

            let tOptions = '<option value="">-- Select A Team --</option>';
            activeTeamsList.forEach((t, index) => { tOptions += `<option value="${index}">${t.name}</option>`; });
            document.getElementById('fix-teamA').innerHTML = tOptions;
            document.getElementById('fix-teamB').innerHTML = tOptions;
        }

        window.addNewPlayer = async () => {
            const nameInput = document.getElementById("new-player-name").value.trim();
            if(!nameInput) return;
            await setDoc(doc(db, "players", nameInput), { rawPoints: 0, bonusPoints: 0, attendance: 0, totalScore: 0, history: [0], partners: [], currentPartner: null, isFreeAgent: false });
            alert("Player added!");
            document.getElementById("new-player-name").value = "";
            loadAllData();
        };

        // --- MATCH & APPROVAL LOGIC ---
        function renderMatches() {
            let fixturesHtml = "", resultsHtml = "", approvalsHtml = "";
            globalMatchesData.forEach(m => {
                const teamAStr = m.teamA.join(" & "), teamBStr = m.teamB.join(" & ");
                if (m.status === "pending") {
                    fixturesHtml += `<div class="match-card"><b>${teamAStr}</b> vs <b>${teamBStr}</b><br><button onclick="userSubmitScore('${m.id}', '${teamAStr}', '${teamBStr}')">Input Score</button></div>`;
                } else if (m.status === "played") {
                    approvalsHtml += `<div class="match-card"><b>${teamAStr}</b> (${m.scoreA}) vs <b>${teamBStr}</b> (${m.scoreB})<br><button onclick="approveScore('${m.id}')">Approve</button></div>`;
                } else if (m.status === "confirmed") {
                    resultsHtml += `<div class="match-card"><b>${teamAStr}</b> ${m.scoreA} - ${m.scoreB} <b>${teamBStr}</b></div>`;
                }
            });
            document.getElementById("fixtures-list").innerHTML = fixturesHtml || "No active fixtures.";
            document.getElementById("results-list").innerHTML = resultsHtml || "No results.";
            document.getElementById("admin-approvals").innerHTML = approvalsHtml || "No pending matches.";
        }

        window.approveScore = async (matchId) => {
            const match = globalMatchesData.find(m => m.id === matchId);
            const batch = writeBatch(db);
            match.teamA.forEach(p => batch.update(doc(db, "players", p), { rawPoints: increment(match.scoreA), totalScore: increment(match.scoreA + 2), attendance: increment(1) }));
            match.teamB.forEach(p => batch.update(doc(db, "players", p), { rawPoints: increment(match.scoreB), totalScore: increment(match.scoreB + 0), attendance: increment(1) }));
            batch.update(doc(db, "matches", matchId), { status: "confirmed" });
            await batch.commit(); loadAllData();
        };

        window.userSubmitScore = async (matchId, teamA, teamB) => {
            const scoreA = prompt(`Points for ${teamA}:`);
            const scoreB = prompt(`Points for ${teamB}:`);
            await updateDoc(doc(db, "matches", matchId), { scoreA: parseInt(scoreA), scoreB: parseInt(scoreB), status: "played" });
            loadAllData();
        };

        // --- FIXTURES & UTILS ---
        window.createFixture = async () => {
            const tA = activeTeamsList[document.getElementById('fix-teamA').value];
            const tB = activeTeamsList[document.getElementById('fix-teamB').value];
            await setDoc(doc(db, "matches", `match_${Date.now()}`), { teamA: [tA.p1, tA.p2], teamB: [tB.p1, tB.p2], scoreA:0, scoreB:0, status: "pending" });
            loadAllData();
        };

        window.openPlayerModal = (playerId) => {
            const p = globalPlayersData.find(p => p.id === playerId);
            document.getElementById("modal-name").innerText = p.id;
            document.getElementById("player-modal").style.display = "block";
            const ctx = document.getElementById('playerChart').getContext('2d');
            if(window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, { type: 'line', data: { labels: ['Start', 'GW1'], datasets: [{ label: 'Score', data: [0, p.totalScore], borderColor: '#18bc9c' }] } });
        };
        window.closeModal = () => document.getElementById("player-modal").style.display = "none";

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab-'+tab).style.display = 'block';
        };

        window.onload = () => { loadAllData(); switchTab('leaderboard'); };
    </script>
    
    <style>
        body { font-family: sans-serif; padding: 15px; background: #121212; color: #e0e0e0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .tab-content { display: none; }
        .match-card { background: #2c2c2c; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
        button { background: #18bc9c; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="tab-container" style="display:flex; justify-content:space-around;">
        <button onclick="switchTab('leaderboard')">🏆 Standings</button>
        <button onclick="switchTab('fixtures')">🎾 Fixtures</button>
        <button onclick="switchTab('results')">📋 Results</button>
    </div>

    <div id="tab-leaderboard" class="tab-content card">
        <h1>🏆 Standings</h1>
        <div class="live-roster-box"><h3>Confirmed Teams</h3><div id="live-teams"></div></div>
        <div id="leaderboard-list"></div>
    </div>

    <div id="tab-fixtures" class="tab-content card">
        <h1>🎾 Fixtures</h1>
        <div id="fixtures-list"></div>
    </div>

    <div id="tab-results" class="tab-content card">
        <h1>📋 Results</h1>
        <div id="results-list"></div>
    </div>

    <div id="player-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); padding:50px;">
        <div style="background:#1e1e1e; padding:20px;">
            <h2 id="modal-name"></h2>
            <canvas id="playerChart"></canvas>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="admin-panel" class="card">
        <h1>⚙️ Admin</h1>
        <div id="admin-approvals"></div>
        <input type="text" id="new-player-name" placeholder="Player Name">
        <button onclick="addNewPlayer()">Add Player</button>
        <select id="fix-teamA"></select>
        <select id="fix-teamB"></select>
        <button onclick="createFixture()">Create Match</button>
    </div>
</body>
</html>
